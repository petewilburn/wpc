name: IndexNow Submit

on:
  push:
    branches: [main]
    paths-ignore:
      - "src/app/prep/**"
      - "middleware.ts"
      - "docs/**"
      - "README.md"
      - ".gitignore"
      - ".env.example"
  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Wait for Vercel deploy to propagate
        run: sleep 60
      - run: node scripts/indexnow.mjs
